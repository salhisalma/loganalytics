<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Log Analytics Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .register-container { max-width: 420px; width: 100%; }
        .card {
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            background: #111827;
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #0a1628, #1a365d);
            padding: 30px 30px 25px 30px;
            text-align: center;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .card-header .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: rgba(59, 130, 246, 0.12);
            border-radius: 14px;
            margin-bottom: 12px;
            border: 1px solid rgba(59, 130, 246, 0.15);
        }
        .card-header .logo-icon i { font-size: 28px; color: #3b82f6; }
        .card-header h3 {
            font-weight: 700;
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        .card-header p { font-size: 14px; color: rgba(255,255,255,0.4); margin: 0; }
        .card-body { padding: 30px; background: #111827; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            font-weight: 600;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 6px;
        }
        .form-group .input-group {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.03);
        }
        .form-group .input-group:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
            background: rgba(255,255,255,0.05);
        }
        .form-group .input-group-text {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.25);
            padding: 0 0 0 14px;
        }
        .form-group .form-control, .form-group .form-select {
            border: none;
            background: transparent;
            padding: 12px 14px 12px 8px;
            font-size: 14px;
            color: #ffffff;
            box-shadow: none;
        }
        .form-group .form-control:focus, .form-group .form-select:focus { box-shadow: none; }
        .form-group .form-control::placeholder { color: rgba(255,255,255,0.2); }
        .form-group .form-select {
            padding-right: 30px;
            cursor: pointer;
            background: transparent;
        }
        .form-group .form-select option { background: #111827; color: #ffffff; }
        .btn-register {
            width: 100%;
            padding: 13px;
            background: #1a365d;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .btn-register:hover {
            background: #1e3f6b;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(26, 54, 93, 0.4);
        }
        .btn-register:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .alert {
            border-radius: 10px;
            font-size: 14px;
            padding: 12px 16px;
            border: none;
            display: none;
        }
        .alert.show { display: block; }
        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border-left: 4px solid #ef4444;
        }
        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            color: #6ee7b7;
            border-left: 4px solid #22c55e;
        }
        .login-link {
            text-align: center;
            margin-top: 18px;
            color: rgba(255,255,255,0.35);
            font-size: 14px;
        }
        .login-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover { text-decoration: underline; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) {
            .card-body { padding: 20px; }
            .card-header { padding: 25px 20px; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="card">
            <div class="card-header">
                <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
                <h3>Create Account</h3>
                <p>Join the Log Analytics Engine</p>
            </div>
            <div class="card-body">
                <div id="message" class="alert"></div>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" placeholder="Choose a username" required autofocus>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" placeholder="Create a password" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="role">Role</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user-tag"></i></span>
                            <select class="form-select" id="role">
                                <option value="ROLE_USER">User</option>
                                <option value="ROLE_ADMIN">Admin</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-register" id="registerBtn">
                        <i class="fas fa-user-plus me-2"></i> Create Account
                    </button>
                </form>
                <div class="login-link">
                    Already have an account? <a href="/login">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const message = document.getElementById('message');
            const submitBtn = document.getElementById('registerBtn');

            if (!username || !password) {
                message.className = 'alert alert-danger show';
                message.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i> Please fill in all fields';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Creating...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });
                const data = await response.json();

                if (data.success) {
                    message.className = 'alert alert-success show';
                    message.innerHTML = '<i class="fas fa-check-circle me-2"></i> Registration successful! Redirecting...';
                    submitBtn.innerHTML = '<i class="fas fa-check me-2"></i> Success!';
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    message.className = 'alert alert-danger show';
                    message.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i> ' + (data.message || 'Registration failed');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-user-plus me-2"></i> Create Account';
                }
            } catch (error) {
                message.className = 'alert alert-danger show';
                message.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i> Error connecting to server';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus me-2"></i> Create Account';
            }
        });
    </script>
</body>
</html>
