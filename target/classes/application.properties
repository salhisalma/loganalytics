# --- MySQL (via XAMPP) ---
spring.datasource.url=jdbc:mysql://localhost:3306/loganalytics?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# H2 console no longer needed with MySQL, but harmless to leave enabled
spring.h2.console.enabled=false

# --- app-specific settings (unchanged from before) ---
app.log.file=logs/app.log
app.log.poll-ms=5000
